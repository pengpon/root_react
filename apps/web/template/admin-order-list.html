<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article List</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div class="flex h-screen overflow-hidden">
      <aside class="z-20 flex w-64 shrink-0 flex-col bg-slate-800 text-white shadow-xl">
        <div class="flex items-center gap-2 border-b border-slate-700 p-6 text-2xl font-bold">
          <div class="size-12">
            <img src="../src/assets/logo_white.png" alt="logo" />
          </div>
          <span>Admin</span>
        </div>

        <nav class="flex-1 space-y-2 overflow-y-auto p-4">
          <p class="px-4 pb-2 text-xs font-semibold text-slate-500 uppercase">Main Menu</p>
          <a
            href="#"
            class="flex items-center rounded-lg px-4 py-3 text-slate-300 transition duration-200"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="mr-3 size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M2.25 18 9 11.25l4.306 4.306a11.95 11.95 0 0 1 5.814-5.518l2.74-1.22m0 0-5.94-2.281m5.94 2.28-2.28 5.941"
              />
            </svg>
            Dashboard
          </a>

          <a
            href="#"
            class="flex items-center rounded-lg px-4 py-3 text-slate-300 transition duration-200 hover:bg-slate-700 hover:text-white"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="mr-3 size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m21 7.5-9-5.25L3 7.5m18 0-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9"
              />
            </svg>
            Products
          </a>
          <a
            href="#"
            class="flex items-center rounded-lg px-4 py-3 text-slate-300 transition duration-200 hover:bg-slate-700 hover:text-white"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="mr-3 size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M16.5 6v.75m0 3v.75m0 3v.75m0 3V18m-9-5.25h5.25M7.5 15h3M3.375 5.25c-.621 0-1.125.504-1.125 1.125v3.026a2.999 2.999 0 0 1 0 5.198v3.026c0 .621.504 1.125 1.125 1.125h17.25c.621 0 1.125-.504 1.125-1.125v-3.026a2.999 2.999 0 0 1 0-5.198V6.375c0-.621-.504-1.125-1.125-1.125H3.375Z"
              />
            </svg>
            Coupons
          </a>

          <a
            href="#"
            class="flex items-center rounded-lg bg-blue-600 px-4 py-3 text-white transition duration-200 hover:bg-slate-700 hover:text-white"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="mr-3 size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10"
              />
            </svg>
            Articles
          </a>
        </nav>
      </aside>

      <main class="flex min-w-0 flex-1 flex-col">
        <header class="z-10 flex h-16 items-center justify-between bg-white px-8 shadow-sm">
          <div class="flex items-center">
            <h2 class="text-xl font-semibold text-gray-800">Articles</h2>
          </div>

          <div class="flex items-center space-x-6">
            <div class="relative">
              <span class="text-gray-600">Hello, Admin</span>
            </div>
            <button
              class="rounded-lg bg-slate-100 px-2 py-1.5 text-sm font-medium text-slate-700 transition hover:bg-red-50 hover:text-red-600"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="currentColor"
                class="size-6"
              >
                <path
                  fill-rule="evenodd"
                  d="M7.5 3.75A1.5 1.5 0 0 0 6 5.25v13.5a1.5 1.5 0 0 0 1.5 1.5h6a1.5 1.5 0 0 0 1.5-1.5V15a.75.75 0 0 1 1.5 0v3.75a3 3 0 0 1-3 3h-6a3 3 0 0 1-3-3V5.25a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3V9A.75.75 0 0 1 15 9V5.25a1.5 1.5 0 0 0-1.5-1.5h-6Zm10.72 4.72a.75.75 0 0 1 1.06 0l3 3a.75.75 0 0 1 0 1.06l-3 3a.75.75 0 1 1-1.06-1.06l1.72-1.72H9a.75.75 0 0 1 0-1.5h10.94l-1.72-1.72a.75.75 0 0 1 0-1.06Z"
                  clip-rule="evenodd"
                />
              </svg>
            </button>
          </div>
        </header>

        <section class="flex-1 overflow-y-auto bg-gray-50 p-8">
          <div
            class="overflow-hidden rounded-2xl border border-gray-100 bg-white shadow-sm lg:col-span-2"
          >
            <div class="flex items-center justify-between border-b border-gray-50 p-6">
              <h3 class="text-lg font-bold text-gray-800">Order Management</h3>
            </div>

            <div class="overflow-x-auto">
              <table class="w-full text-left">
                <thead class="border-b border-gray-100 bg-gray-50">
                  <tr>
                    <th class="px-6 py-4 text-xs font-bold tracking-wider text-gray-500 uppercase">
                      Order Date
                    </th>
                    <th class="px-6 py-4 text-xs font-bold tracking-wider text-gray-500 uppercase">
                      Order ID
                    </th>
                    <th class="px-6 py-4 text-xs font-bold tracking-wider text-gray-500 uppercase">
                      Customer
                    </th>
                    <th class="px-6 py-4 text-xs font-bold tracking-wider text-gray-500 uppercase">
                      Message
                    </th>
                    <th class="px-6 py-4 text-xs font-bold tracking-wider text-gray-500 uppercase">
                      Status
                    </th>
                    <th
                      class="px-6 py-4 text-right text-xs font-bold tracking-wider text-gray-500 uppercase"
                    >
                      Actions
                    </th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                  <tr class="transition hover:bg-gray-50/50">
                    <td class="px-6 py-4 text-sm text-gray-600">2024-04-12</td>

                    <td class="px-6 py-4 font-mono text-xs text-slate-400">-L9u11NAE...</td>

                    <td class="px-6 py-4">
                      <div class="flex flex-col">
                        <span class="text-sm font-bold text-gray-800">test</span>
                        <span class="text-xs text-gray-400">test@gmail.com</span>
                      </div>
                    </td>

                    <td class="px-6 py-4">
                      <p class="max-w-37.5 truncate text-sm text-gray-500" title="這是留言">
                        這是留言
                      </p>
                    </td>

                    <td class="px-6 py-4">
                      <span
                        class="inline-flex items-center gap-1.5 rounded-full bg-red-50 px-2.5 py-1 text-xs font-bold text-red-700"
                      >
                        <span class="h-1.5 w-1.5 rounded-full bg-red-500"></span> Unpaid
                      </span>
                    </td>

                    <td class="px-6 py-4 text-right">
                      <div class="flex items-center justify-end space-x-2">
                        <button
                          title="View Details"
                          class="p-2 text-gray-400 transition hover:text-blue-600"
                        >
                          <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="2"
                            stroke="currentColor"
                            class="size-5"
                          >
                            <path
                              stroke-linecap="round"
                              stroke-linejoin="round"
                              d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"
                            />
                            <path
                              stroke-linecap="round"
                              stroke-linejoin="round"
                              d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                            />
                          </svg>
                        </button>
                        <button
                          title="Delete"
                          class="p-2 text-gray-400 transition hover:text-red-600"
                        >
                          <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="2"
                            stroke="currentColor"
                            class="size-5"
                          >
                            <path
                              stroke-linecap="round"
                              stroke-linejoin="round"
                              d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
                            />
                          </svg>
                        </button>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
