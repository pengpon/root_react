<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Lost in the Wilderness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes ripple {
        0% {
          transform: scale(1);
          opacity: 0.5;
        }
        100% {
          transform: scale(2.5);
          opacity: 0;
        }
      }
      .animate-ripple {
        animation: ripple 3s cubic-bezier(0, 0, 0.2, 1) infinite;
      }
    </style>
  </head>
  <body class="bg-[#FDFCF8] font-sans text-[#2C3E2D]">
    <main class="flex min-h-screen flex-col items-center justify-center px-4 text-center">
      <div class="relative mb-12 flex items-center justify-center">
        <div class="animate-ripple absolute h-16 w-16 rounded-full bg-[#8C5E3C]/30"></div>
        <div
          class="animate-ripple absolute h-16 w-16 rounded-full bg-[#8C5E3C]/15"
          style="animation-delay: 1.5s"
        ></div>

        <div
          class="relative z-10 flex h-24 w-24 items-center justify-center rounded-full border border-[#2C3E2D]/5 bg-white shadow-sm"
        >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor" class="size-10 text-[#8C5E3C]">
  <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
</svg>
        </div>
      </div>

      <div class="max-w-md">
        <h3 class="mb-4 text-[10px] font-bold tracking-[0.5em] text-[#8C5E3C] uppercase">
          Lost in the wild
        </h3>
        <h1 class="text-4xl font-bold tracking-tight text-[#2C3E2D] italic md:text-5xl">
          Deep in the woods, <br />some paths are hidden.
        </h1>
        <p class="mt-6 text-sm leading-relaxed text-gray-500">
          The page you are looking for has been moved, removed, or perhaps it never took root in the
          first place. Let’s guide you back to the clearing.
        </p>
      </div>

      <div class="mt-12 flex flex-col items-center gap-8 md:flex-row">
        <a
          href="/"
          class="rounded-xl bg-[#2C3E2D] px-10 py-4 text-xs font-bold tracking-[0.2em] text-white uppercase shadow-xl transition-all hover:bg-[#1a261b] active:scale-95"
        >
          Back to Home
        </a>
        <a
          href="/shop"
          class="group flex items-center gap-2 text-xs font-bold tracking-[0.2em] text-[#2C3E2D] uppercase"
        >
          Shop the Harvest
          <div class="h-px w-6 bg-[#2C3E2D] transition-all group-hover:w-10"></div>
        </a>
      </div>
    </main>
  </body>
</html>
