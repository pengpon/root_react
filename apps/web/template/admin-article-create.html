<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article Create</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div class="flex h-screen overflow-hidden">
      <aside class="z-20 flex w-64 shrink-0 flex-col bg-slate-800 text-white shadow-xl">
        <div class="flex items-center gap-2 border-b border-slate-700 p-6 text-2xl font-bold">
          <div class="size-12">
            <img src="../src/assets/logo_white.png" alt="logo" />
          </div>
          <span>Admin</span>
        </div>

        <nav class="flex-1 space-y-2 overflow-y-auto p-4">
          <p class="px-4 pb-2 text-xs font-semibold text-slate-500 uppercase">Main Menu</p>
          <a
            href="#"
            class="flex items-center rounded-lg px-4 py-3 text-slate-300 transition duration-200"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="mr-3 size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M2.25 18 9 11.25l4.306 4.306a11.95 11.95 0 0 1 5.814-5.518l2.74-1.22m0 0-5.94-2.281m5.94 2.28-2.28 5.941"
              />
            </svg>
            Dashboard
          </a>

          <a
            href="#"
            class="flex items-center rounded-lg px-4 py-3 text-slate-300 transition duration-200 hover:bg-slate-700 hover:text-white"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="mr-3 size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m21 7.5-9-5.25L3 7.5m18 0-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9"
              />
            </svg>
            Products
          </a>
          <a
            href="#"
            class="flex items-center rounded-lg px-4 py-3 text-slate-300 transition duration-200 hover:bg-slate-700 hover:text-white"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="mr-3 size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M16.5 6v.75m0 3v.75m0 3v.75m0 3V18m-9-5.25h5.25M7.5 15h3M3.375 5.25c-.621 0-1.125.504-1.125 1.125v3.026a2.999 2.999 0 0 1 0 5.198v3.026c0 .621.504 1.125 1.125 1.125h17.25c.621 0 1.125-.504 1.125-1.125v-3.026a2.999 2.999 0 0 1 0-5.198V6.375c0-.621-.504-1.125-1.125-1.125H3.375Z"
              />
            </svg>
            Coupons
          </a>

          <a
            href="#"
            class="flex items-center rounded-lg bg-blue-600 px-4 py-3 text-white transition duration-200 hover:bg-slate-700 hover:text-white"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="mr-3 size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10"
              />
            </svg>
            Articles
          </a>
        </nav>
      </aside>

      <main class="flex min-w-0 flex-1 flex-col">
        <header class="z-10 flex h-16 items-center justify-between bg-white px-8 shadow-sm">
          <div class="flex items-center">
            <h2 class="text-xl font-semibold text-gray-800">Articles</h2>
          </div>

          <div class="flex items-center space-x-6">
            <div class="relative">
              <span class="text-gray-600">Hello, Admin</span>
            </div>
            <button
              class="rounded-lg bg-slate-100 px-2 py-1.5 text-sm font-medium text-slate-700 transition hover:bg-red-50 hover:text-red-600"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="currentColor"
                class="size-6"
              >
                <path
                  fill-rule="evenodd"
                  d="M7.5 3.75A1.5 1.5 0 0 0 6 5.25v13.5a1.5 1.5 0 0 0 1.5 1.5h6a1.5 1.5 0 0 0 1.5-1.5V15a.75.75 0 0 1 1.5 0v3.75a3 3 0 0 1-3 3h-6a3 3 0 0 1-3-3V5.25a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3V9A.75.75 0 0 1 15 9V5.25a1.5 1.5 0 0 0-1.5-1.5h-6Zm10.72 4.72a.75.75 0 0 1 1.06 0l3 3a.75.75 0 0 1 0 1.06l-3 3a.75.75 0 1 1-1.06-1.06l1.72-1.72H9a.75.75 0 0 1 0-1.5h10.94l-1.72-1.72a.75.75 0 0 1 0-1.06Z"
                  clip-rule="evenodd"
                />
              </svg>
            </button>
          </div>
        </header>
        <section class="flex-1 overflow-y-auto bg-gray-50 p-8">
          <div class="mb-8 flex items-center justify-between">
            <div class="flex items-center gap-4">
              <button
                onclick="history.back()"
                class="flex h-10 w-10 items-center justify-center rounded-full bg-white text-gray-600 shadow-sm transition hover:bg-gray-100"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="2"
                  stroke="currentColor"
                  class="size-5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"
                  />
                </svg>
              </button>
              <div>
                <nav class="mb-1 flex text-sm text-gray-500">
                  <a href="#" class="hover:text-blue-600">Articles</a>
                  <span class="mx-2">/</span>
                  <span class="font-medium text-gray-800">New Article</span>
                </nav>
                <h2 class="text-2xl font-bold text-gray-800">Create New Article</h2>
              </div>
            </div>
            <div class="flex gap-3">
              <button
                class="rounded-lg border border-gray-300 bg-white px-6 py-2.5 text-sm font-semibold text-gray-700 transition hover:bg-gray-50"
              >
                Discard
              </button>
              <button
                class="rounded-lg bg-blue-600 px-6 py-2.5 text-sm font-semibold text-white shadow-md shadow-indigo-100 transition hover:bg-blue-700"
              >
                Publish Article
              </button>
            </div>
          </div>

          <div class="grid grid-cols-1 gap-8 lg:grid-cols-3">
            <div class="space-y-8 lg:col-span-2">
              <div class="rounded-2xl border border-gray-100 bg-white p-8 shadow-sm">
                <div class="mb-6 flex items-center gap-3">
                  <div
                    class="flex h-10 w-10 items-center justify-center rounded-xl bg-blue-50 text-blue-600"
                  >
                    <svg class="size-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path
                        d="M12 7.5h1.5m-1.5 3h1.5m-7.5 3h7.5m-7.5 3h7.5m3-9h3.375c.621 0 1.125.504 1.125 1.125V18a2.25 2.25 0 0 1-2.25 2.25M16.5 7.5V18a2.25 2.25 0 0 0 2.25 2.25M16.5 7.5V4.875c0-.621-.504-1.125-1.125-1.125H4.125C3.504 3.75 3 4.254 3 4.875V18a2.25 2.25 0 0 0 2.25 2.25h13.5M6 7.5h3v3H6v-3Z"
                        stroke-width="1.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                  </div>
                  <h3 class="text-lg font-bold text-gray-800">Content</h3>
                </div>
                <div class="space-y-6">
                  <div>
                    <label class="mb-2 block text-sm font-medium text-gray-700"
                      >Article Title</label
                    >
                    <input
                      type="text"
                      value=""
                      placeholder="Enter title"
                      class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-gray-800 focus:border-blue-500 focus:bg-white focus:outline-none"
                    />
                  </div>
                  <div>
                    <label class="mb-2 block text-sm font-medium text-gray-700">Description</label>
                    <textarea
                      rows="3"
                      class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-gray-800 focus:border-blue-500 focus:bg-white focus:outline-none"
                    >
</textarea
                    >
                  </div>
                  <div>
                    <label class="mb-2 block text-sm font-medium text-gray-700">Full Content</label>
                    <div
                      class="min-h-75 rounded-xl border border-gray-200 bg-gray-50 p-4 text-gray-400 italic"
                    >
                      WYSIWYG Editor Placeholder
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="space-y-8">
              <div class="rounded-2xl border border-gray-100 bg-white p-8 shadow-sm">
                <div class="mb-6 flex items-center gap-3">
                  <div
                    class="flex h-10 w-10 items-center justify-center rounded-xl bg-emerald-50 text-emerald-600"
                  >
                    <svg class="size-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path
                        d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"
                        stroke-width="1.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                      <path
                        d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                        stroke-width="1.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                  </div>
                  <h3 class="text-lg font-bold text-gray-800">Visibility</h3>
                </div>
                <div class="space-y-3">
                  <label
                    class="group relative flex cursor-pointer items-center rounded-xl border border-gray-200 p-4 transition-all has-checked:border-emerald-500 has-checked:bg-emerald-50/30"
                  >
                    <input type="radio" name="isPublic" value="true" class="peer sr-only" checked />
                    <div
                      class="flex h-4 w-4 shrink-0 items-center justify-center rounded-full border-4 border-gray-300 bg-white transition-all peer-checked:border-emerald-500"
                    >
                      <div
                        class="h-1.5 w-1.5 rounded-full bg-emerald-500 opacity-0 transition-all peer-checked:opacity-100"
                      ></div>
                    </div>
                    <span class="ml-3 text-sm font-bold text-gray-900 peer-checked:text-emerald-700"
                      >Public</span
                    >
                  </label>
                  <label
                    class="group relative flex cursor-pointer items-center rounded-xl border border-gray-200 p-4 transition-all has-checked:border-slate-500 has-checked:bg-slate-50"
                  >
                    <input type="radio" name="isPublic" value="false" class="peer sr-only" />
                    <div
                      class="flex h-4 w-4 shrink-0 items-center justify-center rounded-full border-4 border-gray-300 bg-white transition-all peer-checked:border-slate-500"
                    >
                      <div
                        class="h-1.5 w-1.5 rounded-full bg-slate-500 opacity-0 transition-all peer-checked:opacity-100"
                      ></div>
                    </div>
                    <span class="ml-3 text-sm font-bold text-gray-900 peer-checked:text-slate-700"
                      >Private (Draft)</span
                    >
                  </label>
                </div>
              </div>

              <div class="rounded-2xl border border-gray-100 bg-white p-8 shadow-sm">
                <div class="mb-6 flex items-center gap-3">
                  <div
                    class="flex h-10 w-10 items-center justify-center rounded-xl bg-amber-50 text-amber-600"
                  >
                    <svg class="size-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path
                        d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
                        stroke-width="1.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                  </div>
                  <h3 class="text-lg font-bold text-gray-800">Metadata</h3>
                </div>
                <div class="space-y-4">
                  <div>
                    <label class="mb-2 block text-sm font-medium text-gray-700">Author</label>
                    <input
                      type="text"
                      value="author"
                      class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm text-gray-800 focus:border-blue-500 focus:bg-white focus:outline-none"
                    />
                  </div>
                  <div>
                    <label class="mb-2 block text-sm font-medium text-gray-700">Create Date</label>
                    <input
                      type="date"
                      value="2026-03-06"
                      class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm text-gray-800 focus:border-blue-500 focus:bg-white focus:outline-none"
                    />
                  </div>
                </div>
              </div>

              <div class="rounded-2xl border border-dashed border-gray-200 bg-gray-50/50 p-6">
                <div class="mb-2 flex items-center justify-between">
                  <span class="text-sm font-medium tracking-wider text-gray-500 uppercase"
                    >Reading Time</span
                  >
                  <span class="text-sm font-bold text-gray-900">~ 5 min</span>
                </div>
                <div class="flex items-center justify-between">
                  <span class="text-sm font-medium tracking-wider text-gray-500 uppercase"
                    >Words</span
                  >
                  <span class="text-sm font-bold text-gray-900">1,250</span>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
